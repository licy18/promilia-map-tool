<!DOCTYPE html>
<html>
<head>
    <title>多层瓦片调试</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 800px; border: 2px solid #333; }
        .info { margin: 10px; font-family: monospace; font-size: 12px; }
        #log { max-height: 300px; overflow-y: auto; background: #1a1a2e; padding: 10px; color: #0f0; }
    </style>
</head>
<body>
    <h1>🗺️ 多层瓦片调试</h1>
    <div class="info">
        <p>瓦片目录：<code>maps/xinaya-tiles-multi/</code></p>
        <p>实际文件：<code>{z}/{x}_{y}.png</code></p>
        <p>CRS: <code>L.CRS.Simple</code></p>
        <p>地图尺寸：<code>1024×1024</code></p>
    </div>
    <div id="map"></div>
    <h3>📋 请求日志：</h3>
    <div id="log"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const log = document.getElementById('log');
        function addLog(msg) {
            log.innerHTML += `<div>${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        // 创建地图（Simple CRS）
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: 0,
            maxZoom: 2
        });

        // 拦截 TileLayer 的瓦片加载
        const originalAddTile = L.GridLayer.prototype._addTile;
        L.GridLayer.prototype._addTile = function(tilePoint, done) {
            const z = tilePoint.z || tilePoint.coords?.z;
            const x = tilePoint.x || tilePoint.coords?.x;
            const y = tilePoint.y || tilePoint.coords?.y;
            addLog(`🔍 请求瓦片：z=${z}, x=${x}, y=${y} → URL: ${this.getTileUrl(tilePoint)}`);
            return originalAddTile.call(this, tilePoint, done);
        };

        // 加载瓦片（使用实际文件名格式 {x}_{y}）
        const tileLayer = L.tileLayer('maps/xinaya-tiles-multi/{z}/{x}_{y}.png', {
            minZoom: 0,
            maxZoom: 2,
            tileSize: 256,
            noWrap: true,
            tms: false,
            bounds: [[0, 0], [1024, 1024]]
        });

        tileLayer.addTo(map);
        map.setView([512, 512], 0);

        addLog('✅ 地图初始化完成');
        addLog('📍 当前视图：zoom=' + map.getZoom() + ', center=' + JSON.stringify(map.getCenter()));
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>多层瓦片调试 v2</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 800px; border: 2px solid #333; }
        .info { margin: 10px; font-family: monospace; font-size: 12px; }
        #log { max-height: 300px; overflow-y: auto; background: #1a1a2e; padding: 10px; color: #0f0; }
    </style>
</head>
<body>
    <h1>🗺️ 多层瓦片调试 v2</h1>
    <div class="info">
        <p>瓦片目录：<code>maps/xinaya-tiles-multi/</code></p>
        <p>文件格式：<code>{z}/{x}_{y}.png</code></p>
        <p>CRS: <code>L.CRS.Simple</code></p>
        <p>地图尺寸：<code>1024×1024</code></p>
        <p>网格配置：</p>
        <ul>
            <li>zoom 0: 1×1 grid (1024×1024)</li>
            <li>zoom 1: 2×2 grid (512×512)</li>
            <li>zoom 2: 4×4 grid (256×256)</li>
        </ul>
    </div>
    <div id="map"></div>
    <h3>📋 请求日志：</h3>
    <div id="log"></div>
    <button onclick="clearLog()">清空日志</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const log = document.getElementById('log');
        function addLog(msg) {
            log.innerHTML += `<div>${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }
        function clearLog() {
            log.innerHTML = '';
        }

        // 创建地图（Simple CRS）
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: 0,
            maxZoom: 2
        });

        // 网格配置
        const gridSizes = {0: 1, 1: 2, 2: 4};
        const tileUrl = 'maps/xinaya-tiles-multi/{z}/{x}_{y}.png';

        // 自定义 GridLayer
        const tileLayer = L.gridLayer({
            minZoom: 0,
            maxZoom: 2
        });

        tileLayer.createTile = function(coords, done) {
            const tile = document.createElement('div');
            const zoom = coords.z;
            const x = coords.x;
            const y = coords.y;
            
            addLog(`🔍 请求：z=${zoom}, (${x},${y})`);
            
            // 检查坐标是否在有效范围内
            const gridSize = gridSizes[zoom];
            if (gridSize === undefined || x < 0 || y < 0 || x >= gridSize || y >= gridSize) {
                addLog(`  ⚠️ 跳过：超出范围 (grid=${gridSize})`);
                tile.style.width = '256px';
                tile.style.height = '256px';
                tile.style.background = 'transparent';
                done(null, tile);
                return tile;
            }
            
            // 生成瓦片 URL
            const url = tileUrl
                .replace('{z}', zoom)
                .replace('{x}', x)
                .replace('{y}', y);
            
            addLog(`  ✅ 加载：${url}`);
            
            // 创建图片
            const img = document.createElement('img');
            img.style.width = '100%';
            img.style.height = '100%';
            img.onload = () => {
                addLog(`  ✓ 加载成功`);
                done(null, tile);
            };
            img.onerror = (e) => {
                addLog(`  ✗ 加载失败`);
                done(e, tile);
            };
            img.src = url;
            tile.appendChild(img);
            
            return tile;
        };

        tileLayer.addTo(map);
        
        // 设置视图到中心
        map.setView([512, 512], 0);
        
        addLog('✅ 地图初始化完成');
        addLog(`📍 初始视图：zoom=${map.getZoom()}, center=${JSON.stringify(map.getCenter())}`);
    </script>
</body>
</html>
